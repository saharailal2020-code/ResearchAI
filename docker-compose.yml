services:
  postgres:
    image: postgres:17-alpine
    container_name: researchai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: researchai_dev
      POSTGRES_USER: researchai_user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - researchai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researchai_user -d researchai_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  researchai_postgres_data:
